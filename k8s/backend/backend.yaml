apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: rookies5-macta
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rookies5-macta-backend
  namespace: rookies5-macta
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rookies5-macta-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: rookies5-macta-backend
    spec:
      serviceAccountName: backend-sa
      containers:
        - name: backend
          image: 105588835975.dkr.ecr.ap-northeast-2.amazonaws.com/rookies5-macta/backend:41c1bb9b3c9a73d87f8af559549616cb43eff507
          ports:
            - containerPort: 8080
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DB_URL
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DB_PASSWORD
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: AWS_REGION
            - name: AWS_STS_REGIONAL_ENDPOINTS
              value: regional
            - name: AWS_EC2_METADATA_DISABLED
              value: "true"
            - name: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              value: "5"
            - name: SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE
              value: "1"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: JWT_SECRET
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: REDIS_PASSWORD
            - name: S3_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: S3_BUCKET_NAME
            - name: AWS_S3_BASE_DIRECTORY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: AWS_S3_BASE_DIRECTORY
            - name: AWS_S3_PRESIGNED_URL_EXPIRATION_MINUTES
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: AWS_S3_PRESIGNED_URL_EXPIRATION_MINUTES
            - name: AWS_S3_MAX_UPLOAD_SIZE
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: AWS_S3_MAX_UPLOAD_SIZE
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: rookies5-macta-backend-service
  namespace: rookies5-macta
spec:
  type: ClusterIP
  selector:
    app: rookies5-macta-backend
  ports:
    - port: 8080
      targetPort: 8080
