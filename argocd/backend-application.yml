apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rookies5-macta-backend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/SK-Rookies5-Auction/infra'
    targetRevision: HEAD
    path: 'k8s/backend'
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: rookies5-macta
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
